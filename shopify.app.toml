name = "order-docs-printer"
client_id = "SHOPIFY_API_KEY_PLACEHOLDER"
application_url = "https://PLACEHOLDER.example.com"
embedded = true

[access_scopes]
scopes = "read_orders,read_customers"

[auth]
redirect_urls = [
  "https://PLACEHOLDER.example.com/auth/callback",
  "https://PLACEHOLDER.example.com/auth/shopify/callback",
  "https://PLACEHOLDER.example.com/api/auth/callback"
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders-create"

  [[webhooks.subscriptions]]
  topics = ["orders/paid"]
  uri = "/webhooks/orders-paid"

[pos]
embedded = false
