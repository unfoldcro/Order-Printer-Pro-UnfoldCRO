# ─────────────────────────────────────────────────────────────
# FIELDS TO FILL IN THIS FILE:
#
# client_id       → Your Shopify app's API key (Client ID).
#                   Found at: partners.shopify.com → Apps → [Your App] → App setup
#
# application_url → The public HTTPS URL where this app is hosted.
#                   Replace ALL three occurrences of the placeholder URL below.
#                   Use your tunnel URL for local dev (e.g. https://abc.ngrok.io)
#                   or your production domain.
# ─────────────────────────────────────────────────────────────

name = "order-docs-printer"
client_id = "YOUR_SHOPIFY_API_KEY"       # ← replace with your API key / Client ID
application_url = "https://YOUR_APP_URL" # ← replace with your public HTTPS app URL
embedded = true

[access_scopes]
scopes = "read_orders,read_customers"

[auth]
redirect_urls = [
  "https://YOUR_APP_URL/auth/callback",         # ← replace YOUR_APP_URL
  "https://YOUR_APP_URL/auth/shopify/callback", # ← replace YOUR_APP_URL
  "https://YOUR_APP_URL/api/auth/callback"      # ← replace YOUR_APP_URL
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders-create"

  [[webhooks.subscriptions]]
  topics = ["orders/paid"]
  uri = "/webhooks/orders-paid"

[pos]
embedded = false
