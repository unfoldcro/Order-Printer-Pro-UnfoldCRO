# Render Blueprint — Order Docs Printer
# Docs: https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this file to your repo root.
#   2. In Render Dashboard → New → Blueprint → connect this repo.
#   3. Render will create the web service + Postgres database automatically.
#   4. After deploy, set the secret environment variables in the Render Dashboard
#      (SHOPIFY_API_KEY, SHOPIFY_API_SECRET, SENDGRID_API_KEY).

services:
  # ── Web Service (main app) ─────────────────────────────────
  - type: web
    name: order-docs-printer
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: copilot/add-document-templates-feature
    region: singapore              # change to your preferred region
    plan: starter                  # starter = 512 MB RAM, $7/mo — upgrade if needed

    healthCheckPath: /

    envVars:
      # Set these in the Render Dashboard → Environment (do NOT hard-code secrets here)
      - key: SHOPIFY_API_KEY
        sync: false                # marks as secret — you type the value in the dashboard

      - key: SHOPIFY_API_SECRET
        sync: false

      - key: SENDGRID_API_KEY
        sync: false

      # Auto-wired from the database below — do not change
      - key: DATABASE_URL
        fromDatabase:
          name: order-docs-printer-db
          property: connectionString

      # Fixed values — no need to change
      - key: SCOPES
        value: read_orders,read_customers

      - key: NODE_ENV
        value: production

      - key: PORT
        value: "3000"

      # Set this to your Render service URL after first deploy
      - key: SHOPIFY_APP_URL
        value: https://order-printer-pro-unfoldcro.onrender.com

  # ── Background Worker ─────────────────────────────────────
  - type: worker
    name: order-docs-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: node worker.js
    branch: copilot/add-document-templates-feature
    region: singapore
    plan: starter

    envVars:
      - key: SHOPIFY_API_KEY
        sync: false

      - key: SHOPIFY_API_SECRET
        sync: false

      - key: SENDGRID_API_KEY
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: order-docs-printer-db
          property: connectionString

      - key: NODE_ENV
        value: production

# ── PostgreSQL Database ────────────────────────────────────
databases:
  - name: order-docs-printer-db
    region: singapore              # must match service region
    plan: starter                  # starter = 256 MB, $7/mo
    databaseName: order_docs_printer
    user: order_docs_printer
